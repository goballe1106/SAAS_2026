version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: erp_sas_db
    restart: always
    environment:
      POSTGRES_USER: erp_sas
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ErpSas2026!}
      POSTGRES_DB: erp_sas
    volumes:
      - erp_db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - erp_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U erp_sas -d erp_sas"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: erp_sas_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - erp_redis_data:/data
    networks:
      - erp_network

  # Backend API
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: erp_sas_api
    restart: always
    environment:
      NODE_ENV: production
      PORT: 3001
      
      # Database
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: erp_sas
      DB_PASSWORD: ${DB_PASSWORD:-ErpSas2026!}
      DB_NAME: erp_sas
      
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      
      # JWT
      JWT_SECRET: ${JWT_SECRET:-ErpSAS2026SuperSecretKeyChangeInProduction}
      
      # App URLs
      APP_URL: ${APP_URL:-https://erp.tudominio.com}
      API_URL: ${API_URL:-https://erp.tudominio.com}
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - erp_network

  # Frontend
  frontend:
    image: nginx:alpine
    container_name: erp_sas_frontend
    restart: always
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
      - "443:443"
    networks:
      - erp_network
    depends_on:
      - api

volumes:
  erp_db_data:
  erp_redis_data:

networks:
  erp_network:
    driver: bridge
