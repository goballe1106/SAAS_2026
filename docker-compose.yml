version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: erp_sas_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: erp_sas
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ErpSas2026!}
      POSTGRES_DB: erp_sas
    volumes:
      - erp_db_data:/var/lib/postgresql/data
      - ./backend/drizzle/migrations:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U erp_sas -d erp_sas"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: erp_sas_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - erp_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: erp_sas_api
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${API_PORT:-3001}
      
      # Database
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: erp_sas
      DB_PASSWORD: ${DB_PASSWORD:-ErpSas2026!}
      DB_NAME: erp_sas
      
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      
      # JWT
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      
      # App
      APP_URL: ${APP_URL:-http://localhost:5173}
      API_URL: ${API_URL:-http://localhost:3001}
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: sh -c "npx drizzle-kit migrate && npm run dev"

volumes:
  erp_db_data:
  erp_redis_data:

networks:
  default:
    name: erp_sas_network
