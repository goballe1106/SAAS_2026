services:
  db:
    image: postgres:16-alpine
    container_name: erp_sas_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: erp_sas
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ErpSas2026!}
      POSTGRES_DB: erp_sas
    volumes:
      - erp_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U erp_sas -d erp_sas"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: erp_sas_redis
    restart: unless-stopped
    volumes:
      - erp_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: erp_sas_api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DB_HOST: erp_sas_db
      DB_PORT: 5432
      DB_USER: erp_sas
      DB_PASSWORD: ${DB_PASSWORD:-ErpSas2026!}
      DB_NAME: erp_sas
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-ErpSAS2026SuperSecretKey}
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3001}
    container_name: erp_sas_frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - api

volumes:
  erp_db_data:
  erp_redis_data:
